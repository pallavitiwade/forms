<div class="container mt-5">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <form #signUp="ngForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label for="Username">Username</label>
              <input required minlength="6" name="Username" ngModel #Username="ngModel" type="text" class="form-control">
              <strong class="text-danger" *ngIf="Username.touched && Username.invalid && Username.hasError('required')">Username is required
                filed.</strong>
                 <strong class="text-danger" *ngIf="Username.touched && Username.invalid && Username.hasError('minlength')">minlength of Username should be 6
          </strong>

            </div>

              <div class="form-group">
                <label for="Email">Username</label>
                <input required name="Email" ngModel #Email="ngModel" type="text" class="form-control">
                <strong class="text-danger" *ngIf="Email.touched && Email.invalid">Email is required
                  filed.</strong>
              </div>

              <button mat-raised-button color="primary" class="btn-block">Sign Up</button>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
