<div class="container mt-5">
    <div class="row">

        <div class="col-md-12">
            <div class="card">
                <h4 class="text-center text-warning mt-4"><strong>Student Registration</strong></h4>
                <div class="card-body">
                    <form #registerTwo="ngForm" (ngSubmit)="onSubmit()">
                        <div class="form-group">
                            <label for="FullName">FullName*</label>
                            <input required name="FullName" ngModel #FullName="ngModel" type="text" class="form-control"
                                pattern="[a-zA-Z0-9._-]{1,}@{1}[a-zA-Z.-]{2,}[.]{1}[a-zA-Z]{2,}">

                            <strong class="text-danger"
                                *ngIf="FullName.touched  && FullName.hasError('required')">FullName is required
                                field</strong>


                        </div>
                        <div class="form-group">
                            <label for="form-group">Email*</label>
                            <input required name="Email" ngModel #Email="ngModel" type="text" class="form-control"
                                pattern="^[a-zA-Z0-9._%+-]+@[a-zA-z0-9.-]+\.[a-zA-z]{2,}$">
                            <strong class="text-danger" *ngIf="Email.touched  && Email.hasError('required')">Email is
                                required field</strong>

                            <strong class="text-danger" *ngIf="Email.touched && Email.hasError('pattern')"> Enter Invalid Email 
                            
                            </strong>


                        </div>
                        <div class="form-group">
                            <label for="MobileNumber">Mobile Number*</label>
                            <input required name="MobileNumber" ngModel #MobileNumber="ngModel" type="text"
                                class="form-control" pattern="^[0-9]{10}$" maxlength="10">
                            <strong class="text-danger"
                                *ngIf="MobileNumber.touched && MobileNumber.hasError('required')">Mobile Number is
                                required field</strong>
                           <strong class="text-danger"
                                *ngIf="MobileNumber.dirty && MobileNumber.hasError('pattern')">Mobile Number must
                                be 10 digit</strong>


                        </div>
                        <div class="form-group">
                            <label *ngFor="let g of gender" [for]="g.gen" class="mr-2">
                                <input required [value]="g.gen" ngModel type="radio" name="gender"
                                    [id]="g.gen">{{g.gen}}</label>


                        </div>
                        <div class="form-group">
                            <label for="Course">Course*</label>
                            <select type="text" required name="Course" ngModel #Course="ngModel" class="form-control">
                                <option value="BBA">BBA</option>
                                <option value="BCA">BCA</option>
                                <option value="MCA">MCA</option>
                                <option value="MBA">MBA</option>

                            </select>
                        </div>
                        <div class="form-group">
                            <label for="Address">Address*</label>
                            <textarea type="text" rows="4" required name="Address" ngModel #Address="ngModel"
                                class="form-control">

                            </textarea>
                        </div>
                        <div class="form-group">
                            <input type="checkbox" required name="check" ngModel #check="ngModel">
                           You Must accept Terms & Conditions<br>
                           <strong class="text-danger" *ngIf="check.touched && check.hasError('required')">Terms and conditions is required field</strong> 

                        </div>
                        <button class="btn btn-block btn-warning">Register</button>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
